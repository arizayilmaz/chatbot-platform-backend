spring.application.name=${SPRING_APPLICATION_NAME:chatbot-platform}

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/chatbot}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:password}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# RabbitMQ
spring.rabbitmq.host=${RABBIT_HOST:localhost}
spring.rabbitmq.port=${RABBIT_PORT:5672}
spring.rabbitmq.username=${RABBIT_USER:guest}
spring.rabbitmq.password=${RABBIT_PASS:guest}

# Flyway
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration

# LLM
app.llm.base-url=${LLM_BASE_URL:http://localhost:11434}
app.llm.model=${LLM_MODEL:llama3.2:3b}
app.llm.timeout-seconds=${LLM_TIMEOUT_SECONDS:60}

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expires-minutes=${JWT_EXPIRES_MINUTES:120}

# Events
app.events.exchange=${EVENTS_EXCHANGE:chat.events}
app.events.queue=${EVENTS_QUEUE:chat.audit}
spring.rabbitmq.dynamic=true

# Outbox Pattern
app.outbox.batch-size=${OUTBOX_BATCH_SIZE:50}
app.outbox.max-attempts=${OUTBOX_MAX_ATTEMPTS:5}
app.outbox.initial-delay-seconds=${OUTBOX_INITIAL_DELAY:10}
app.outbox.poll-interval-ms=${OUTBOX_POLL_INTERVAL_MS:5000}

# i18n
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,http://127.0.0.1:5173,http://127.0.0.1:4173}

